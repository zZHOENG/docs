name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 全局权限（构建需要 read，部署需要 pages/id-token write）
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # 1. 构建并上传成品
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

  # 2. 部署到 GitHub Pages（必须含 environment）
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
