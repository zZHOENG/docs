name: Initialize Docusaurus

# 手动触发，避免首次创建文件时自动运行
on: workflow_dispatch

jobs:
  init:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Create Docusaurus project
        run: |
          npx create-docusaurus@latest temp classic --javascript --skip-install
          shopt -s dotglob
          mv temp/* .
          rmdir temp

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Initialize Docusaurus site" || echo "No changes to commit"
          git push
