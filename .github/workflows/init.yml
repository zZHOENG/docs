name: Initialize Docusaurus

on: workflow_dispatch

jobs:
  init:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-node@v5
        with:
          node-version: 22          # 从 18 改为 22（满足 ≥20 的要求）

      - name: Create Docusaurus project
        run: |
          npx create-docusaurus@latest temp classic --javascript --skip-install
          shopt -s dotglob
          mv temp/* .
          rmdir temp

      - name: Install dependencies
        run: npm install

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Initialize Docusaurus site with lockfile" || echo "No changes to commit"
          git push
